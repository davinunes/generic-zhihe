# Configuração do ndppd (NDP Proxy) para modem UFI003
# Proxying de solicitações NDP entre a WAN (wwan0) e a LAN (br0)

route-ttl 30000

proxy wwan0 {
    router yes
    timeout 500
    ttl 30000

    # NOTA: A regra com o prefixo dinâmico da Vivo será adicionada 
    # dinamicamente pelo script frankenstein-v2.sh ao conectar ao 4G.
    # Exemplo:
    # rule 2804:xxxx::/64 {
    #     static
    # }
}
